services:
  connector-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ballpro_connector
      POSTGRES_USER: ballpro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - connector-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ballpro -d ballpro_connector"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - default

  connector-web:
    build: .
    restart: unless-stopped
    command: ["sh", "-c", "npm run db:migrate && node .next/standalone/server.js"]
    env_file: .env
    environment:
      CONNECTOR_DATABASE_URL: postgresql://ballpro:${POSTGRES_PASSWORD}@connector-db:5432/ballpro_connector
      # Docker sets HOSTNAME to the container id; Next.js standalone binds to it,
      # so it would listen only on the container IP. Force all interfaces so the
      # localhost healthcheck and Traefik routing both reach it.
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    depends_on:
      connector-db:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      # Pure liveness: alive if the web server answers HTTP at all. We accept ANY
      # response (even a 404) and only fail on a connection error, so a missing
      # route, an app-level error, or a slow RepSpark/Shopify dependency can never
      # mark the container unhealthy and get it deregistered (a 404/504 for the
      # whole UI). Dependency status lives in /api/health for the dashboard.
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health/live').then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - default
      - coolify

  connector-worker:
    build: .
    restart: unless-stopped
    command: ["sh", "-c", "npm run db:migrate && npm run worker"]
    env_file: .env
    environment:
      CONNECTOR_DATABASE_URL: postgresql://ballpro:${POSTGRES_PASSWORD}@connector-db:5432/ballpro_connector
    depends_on:
      connector-db:
        condition: service_healthy
    networks:
      - default
      - coolify

volumes:
  connector-db-data:

networks:
  default:
  coolify:
    external: true
    name: coolify
